<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0px;
			padding: 0px;
			overflow: hidden;
		}

		canvas {
			display: block;
		}
	</style>
</head>

<body>
	<canvas id="canvas"></canvas>
	<script type="module">
		import { Game, Entity, transform, sprite } from '../../src/main.ts';

		var init = function (context, services) {

			var spr = new Image();
			spr.src = "sprite1.png";

			var e = new Entity();
			e.addComponent(transform({ position: { x: 10, y: 10 }}));
			e.addComponent(sprite({ spriteSource: spr }));

			context.addEntity(e);
		}

		var mainScene = {
			sceneId: 'main',
			init: init,
			alwaysInitialize: true
		};

		new Game()
			.addScene(mainScene)
			.startRendering();
	</script>
</body>

</html>

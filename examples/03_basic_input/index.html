<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0px;
			padding: 0px;
			overflow: hidden;
		}

		canvas {
			display: block;
		}
	</style>
</head>

<body>
	<canvas id="canvas"></canvas>
	<script type="module">
		import {
			Game,
			transform,
			velocity,
			box,
			inputMapping,
		} from '../../src/main.ts';

		var canvas = document.getElementById('canvas');
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;

		const movementSystem = {
			id: 'movementSystem',
			requiredComponents: ['transform', 'velocity', 'inputMapping'],
			update: (entity, scene, services, frameData) => {
					const vel = entity.get(velocity);
					const input = entity.get(inputMapping);

					vel.x = 0;
					vel.y = 0;

					if (input.down)
						vel.y = 1;
					if (input.up)
						vel.y = -1;
					if (input.left)
						vel.x = -1;
					if (input.right)
						vel.x = 1;
				}

		}

		const player = () => [
			transform({ position: { x: 10, y: 10 }}),
			velocity({ x: 0, y: 0}),
			box({ width: 30, height: 30, fillStyle: 'rgb(0, 0, 0, 1)'}),
			inputMapping({ mapping: [
				{ name: 'up', code: 38 },
				{ name: 'down', code: 40 },
				{ name: 'left', code: 37 },
				{ name: 'right', code: 39 }
			]})
		]

		const scene = {
			sceneId: 'main',
			alwaysInitialize: true,
			systems: [movementSystem],
			entities: [player]
		};

		new Game()
			.addScene(scene)
			.startRendering();

	</script>
</body>

</html>

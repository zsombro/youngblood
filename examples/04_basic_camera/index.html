<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0px;
                padding: 0px;
                overflow: hidden;
            }
    
            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <script type="module">
            import { Game, camera, transform, velocity, box, inputMapping } from '../../src/main.ts';

            const movementSystem = {
                id: 'movementSystem',
                requiredComponents: ['transform', 'velocity', 'inputMapping'],
                update: entity => {
                    const vel = entity.get(velocity);
                    const input = entity.get(inputMapping);

                    vel.x = 0;
                    vel.y = 0;

                    if (input.down)
                        vel.y = 1;
                    if (input.up)
                        vel.y = -1;
                    if (input.left)
                        vel.x = -1;
                    if (input.right)
                        vel.x = 1;
                }
            }

            const player = () => [
                camera({}),
                transform({ position: { x: 50, y: 50 } }),
                velocity({ x: 0, y: 0}),
                box({ width: 30, height: 30, fillStyle: 'rgb(0, 0, 0, 1)'}),
                inputMapping({ mapping: [
                    { name: 'up', code: 38 },
                    { name: 'down', code: 40 },
                    { name: 'left', code: 37 },
                    { name: 'right', code: 39 }
                ]})
            ];

            const comparisonObject = () => [
                transform({ position: { x: 250, y: 120 } }),
                box({ width: 30, height: 30, fillStyle: 'rgb(255, 0, 0, 1)' }),
            ];

            const scene = {
                sceneId: 'main',
                alwaysInitialize: true,
                systems: [movementSystem],
                entities: [player, comparisonObject],
            }

            new Game()
                .addScene(scene)
                .startRendering();
        </script>
    </body>
</html>

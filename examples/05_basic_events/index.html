<html>
    <head>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0px;
                padding: 0px;
                overflow: hidden;
            }
    
            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <script type="module">
            import { Game, Entity, transform, box, label } from '../../src/main.ts';

            const objectSpawningSystem = {
                id: 'objectSpawningSystem',
                requiredComponents: [],
                update(entity, scene, services) {
                    services.event.on('spawn_object', position => {
                        const e = new Entity()
                        e.addComponent(transform({ position }))
                        e.addComponent(box({ width: 30, height: 30, fillStyle: 'rgb(0, 0, 0, 1)'}))

                        scene.addEntity(e)
                    })

                    services.event.on('input.keyup', e => {
                        scene.addEntity([transform({ position: { x: Math.random() * 100, y: Math.random() * 100}}), label({ txt: e.code, color: '#f00' })])
                    })
                }
            }

            const scene = {
                sceneId: 'main',
                alwaysInitialize: true,
                systems: [objectSpawningSystem],
                entities: [],
                init(context, services) {
                    setInterval(() => {
                        services.event.dispatch('spawn_object', {
                            x: Math.random() * 100, y: Math.random() * 100
                        })
                    }, 1000)
                }
            }

            new Game()
                .addScene(scene)
                .startRendering()
        </script>
    </body>
</html>

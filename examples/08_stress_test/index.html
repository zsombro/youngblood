<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0px;
                padding: 0px;
                overflow: hidden;
            }

            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="stats"></div>
        <canvas id="canvas"></canvas>
        <script type="module">
            import { Game, Entity, camera, transform, velocity, animatedSprite } from '../../src/main.ts';

            const ENTITY_COUNT = 100;
            const MAX_SPEED = 1.8;

            const canvas = document.getElementById('canvas');
            const stats = document.getElementById('stats');

            const updateCanvasSize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };

            updateCanvasSize();
            window.addEventListener('resize', updateCanvasSize);

            stats.style.position = 'fixed';
            stats.style.top = '8px';
            stats.style.left = '8px';
            stats.style.padding = '6px 8px';
            stats.style.background = 'rgba(255, 255, 255, 0.85)';
            stats.style.fontFamily = 'monospace';
            stats.style.fontSize = '12px';

            const loadImage = src => {
                const image = new Image();
                image.src = src;

                return new Promise((resolve, reject) => {
                    image.onload = () => resolve(image);
                    image.onerror = reject;
                });
            };

            const loadJson = async src => {
                const response = await fetch(src);
                return response.json();
            };

            const cameraEntity = () => {
                const e = new Entity('stress-camera');
                e.addComponents([
                    transform({ position: { x: canvas.width / 2, y: canvas.height / 2 }, rotation: 0, scale: 1, zIndex: 0 }),
                    camera(),
                ]);
                return e;
            };

            const start = async () => {
                stats.textContent = 'loading minotaur assets...';

                const [minotaurImage, minotaurSheet] = await Promise.all([
                    loadImage('./128x80Minotaur_FullSheet.png'),
                    loadJson('./minotaur.json'),
                ]);

                const animationName = 'running';
                const running = minotaurSheet[animationName];
                const minScale = 1;
                const maxScale = 3;

                const bounceSystem = {
                    id: 'bounceSystem',
                    requiredComponents: ['transform', 'velocity', 'animatedSprite'],
                    update: entity => {
                        const tf = entity.get(transform);
                        const vel = entity.get(velocity);
                        const spriteData = entity.get(animatedSprite);

                        const currentAnimation = spriteData.animationSheet[spriteData.animationName];
                        const width = currentAnimation.frameWidth * spriteData.scale;
                        const height = currentAnimation.frameHeight * spriteData.scale;

                        tf.rotation += 1;

                        if (tf.position.x <= 0 && vel.x < 0) vel.x *= -1;
                        if (tf.position.x + width >= canvas.width && vel.x > 0) vel.x *= -1;
                        if (tf.position.y <= 0 && vel.y < 0) vel.y *= -1;
                        if (tf.position.y + height >= canvas.height && vel.y > 0) vel.y *= -1;
                    },
                };

                const entities = [];
                for (let i = 0; i < ENTITY_COUNT; i++) {
                    entities.push(() => {
                        const speedX = (Math.random() * 2 - 1) * MAX_SPEED;
                        const speedY = (Math.random() * 2 - 1) * MAX_SPEED;
                        const scale = minScale + Math.random() * (maxScale - minScale);
                        const width = running.frameWidth * scale;
                        const height = running.frameHeight * scale;

                        return [
                            transform({
                                position: {
                                    x: Math.random() * (canvas.width - width),
                                    y: Math.random() * (canvas.height - height),
                                },
                                rotation: 0,
                                scale: 1,
                                zIndex: 0,
                            }),
                            velocity({ x: speedX, y: speedY }),
                            animatedSprite({
                                spriteSource: minotaurImage,
                                animationSheet: minotaurSheet,
                                currentFrame: 0,
                                animationName,
                                scale,
                                loop: true,
                                isPlaying: true,
                                flip: false,
                            }),
                        ];
                    });
                }

                const scene = {
                    sceneId: 'stressTest',
                    alwaysInitialize: true,
                    systems: [bounceSystem],
                    entities: [cameraEntity, ...entities],
                };

                const game = new Game();
                game.addScene(scene).startRendering('#canvas');
            };

            start();

            let frameCounter = 0;
            let lastSampleTime = performance.now();
            let currentFps = 0;

            const updateStats = now => {
                frameCounter++;

                const elapsed = now - lastSampleTime;
                if (elapsed >= 250) {
                    currentFps = Math.round((frameCounter * 1000) / elapsed);
                    frameCounter = 0;
                    lastSampleTime = now;
                    stats.textContent = `entities: ${ENTITY_COUNT} | fps: ${currentFps}`;
                }

                requestAnimationFrame(updateStats);
            };

            requestAnimationFrame(updateStats);
        </script>
    </body>
</html>

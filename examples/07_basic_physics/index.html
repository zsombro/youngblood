<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas></canvas>
	<script type="module">
		import { Game, transform, box, physicsObject } from '../../src/main.ts';

        const actor = () => [
            transform({ position: { x: 10, y: 10 }}),
			box({ width: 30, height: 30, fillStyle: 'rgb(255, 0, 0, 1)'}),
            physicsObject({ width: 30, height: 30, bodyType: 'kinetic'})
        ]

        const ground = () => [
            transform({ position: { x: 10, y: 100 }}),
            box({ width: 300, height: 30, fillStyle: 'rgb(0, 255, 0, 1)'}),
            physicsObject({ width: 300, height: 30, bodyType: 'static'})
        ]

        const scene = {
            sceneId: 'main',
            alwaysInitialize: true,
            entities: [actor, ground]
        }

        new Game()
            .addScene(scene)
            .startRendering()
    </script>
</body>
</html>

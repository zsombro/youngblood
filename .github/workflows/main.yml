name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automatically caches node_modules for faster runs

      - name: Install dependencies
        run: npm ci

      - name: Static Type Check
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Run unit tests
        run: npm run coverage
